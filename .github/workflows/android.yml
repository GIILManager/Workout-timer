name: Android Build

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

jobs:
  debug:
    # Fast-track: unsigned debug APK that you can sideload immediately.
    # Runs on every push so you can grab an installable build straight away.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: workout-timer-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  release:
    # Signed release APK. Only runs on main, and only if keystore secrets exist.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/workout-timer.keystore

      - name: Wire signing config into build.gradle
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('android/app/build.gradle')
          src = p.read_text()
          signing_block = """
              signingConfigs {
                  release {
                      def kp = new Properties()
                      def kf = rootProject.file('key.properties')
                      if (kf.exists()) { kf.withReader('UTF-8') { kp.load(it) } }
                      storeFile file(kp['storeFile'] ?: 'workout-timer.keystore')
                      storePassword kp['storePassword']
                      keyAlias kp['keyAlias']
                      keyPassword kp['keyPassword']
                  }
              }
          """
          if 'signingConfigs {' not in src or 'release {' not in src.split('signingConfigs {',1)[1].split('}',1)[0]:
              src = src.replace('android {', 'android {\n' + signing_block, 1)
          src = src.replace(
              'signingConfig signingConfigs.debug',
              'signingConfig signingConfigs.release',
          )
          p.write_text(src)
          print('build.gradle patched')
          PY

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=workout-timer.keystore
          EOF

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: workout-timer-release
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
